<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Gridlock Duel project thumbnail</title>
  <desc id="desc">Stylized game board with connected player nodes and real-time event lines.</desc>
  <defs>
